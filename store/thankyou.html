
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>شكراً لشرائك | GloUp</title>
<style>
body { 
    font-family:"Tajawal",Arial,sans-serif; 
    background:#f5f6fa; 
    margin:0; 
    padding:0; 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    min-height:100vh; 
}
.container { 
    text-align:center; 
    background:#fff; 
    padding:40px; 
    border-radius:12px; 
    box-shadow:0 6px 20px rgba(0,0,0,0.06); 
    max-width:500px; 
}
h1 { 
    color:#2e7d32; 
    font-size:28px; 
    margin-bottom:20px; 
}
img { 
    width:100px; 
    margin-bottom:20px; 
}
a.button { 
    display:inline-block; 
    padding:12px 25px; 
    font-size:16px; 
    border:none; 
    border-radius:8px; 
    background:#ff5722; 
    color:#fff; 
    text-decoration:none; 
    cursor:pointer; 
    transition:0.3s; 
}
a.button:hover { 
    background:#e64a19; 
}
</style>
</head>
<body>
<div class="container">
    <img src="./green.png" alt="تم الشراء بنجاح">
    <h1>شكراً لشرائك من موقعنا!</h1>
    <a href="index.html" class="button">الصفحة الرئيسية</a>
</div>
</body>
</html>
