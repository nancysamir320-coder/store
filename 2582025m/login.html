<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول | GloUp</title>
<style>
body { font-family:"Tajawal",Arial,sans-serif; background:#f5f6fa; margin:0; padding:0; }
.container { max-width:500px; margin:60px auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.06); }
h1 { text-align:center; color:#222; margin-bottom:20px; }
form { display:flex; flex-direction:column; gap:15px; }
input { padding:12px; font-size:16px; border-radius:8px; border:1px solid #ddd; }
button { padding:12px; font-size:16px; border:none; border-radius:8px; background:#4caf50; color:#fff; cursor:pointer; transition:0.3s; }
button:hover { background:#388e3c; }
p { text-align:center; font-size:14px; color:#666; margin-top:10px; }
a { color:#ff5722; text-decoration:none; }
.msg { text-align:center; font-size:14px; margin-top:8px; color:#c62828; }
</style>
</head>
<body>
<div class="container">
<h1>تسجيل الدخول</h1>
<form id="loginForm">
<input type="email" name="email" placeholder="البريد الإلكتروني" required>
<input type="password" name="password" placeholder="كلمة المرور" required>
<button type="submit">دخول</button>
</form>
<div class="msg" id="loginMsg"></div>
<p>ليس لديك حساب؟ <a href="signup.html">إنشاء حساب</a></p>
</div>

<script>
const loginForm = document.getElementById("loginForm");
const loginMsg = document.getElementById("loginMsg");

loginForm.addEventListener("submit", function(e){
    e.preventDefault();
    
    const email = loginForm.email.value;
    const password = loginForm.password.value;

    // استرجاع بيانات المستخدم من sessionStorage
    const storedUser = JSON.parse(sessionStorage.getItem("user") || "{}");

    if(storedUser.email === email && storedUser.password === password){
        loginMsg.style.color = "#2e7d32";
        loginMsg.textContent = "تم تسجيل الدخول بنجاح ✅";

        // تحويل لصفحة مراجعة الشراء أو الرئيسية بعد تسجيل الدخول
        setTimeout(() => {
            window.location.href = "review.html"; // ممكن تغيريها للصفحة المطلوبة
        }, 1500);
    } else {
        loginMsg.style.color = "#c62828";
        loginMsg.textContent = "البريد الإلكتروني أو كلمة المرور غير صحيحة ❌";
    }
});
</script>
</body>
</html>
